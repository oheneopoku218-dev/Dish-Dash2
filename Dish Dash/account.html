

  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account • Dish Dash</title>
    <link rel="stylesheet" href="CSS/Dish-Dash.css">
    <link rel="stylesheet" href="CSS/Navbar.css">
    <link rel="stylesheet" href="CSS/account.css">
  </head>
  <body>

    <header class="site-header">
      <h1 class="site-title" onclick="window.location.href='Dish-Dash.html'">Dish Dash</h1>
    </header>

    <div class="account-wrapper">

      <!-- Profile Card -->
      <div class="profile-card">
        <div class="avatar-wrapper">
          <img id="profile-pic" src="https://ui-avatars.com/api/?background=ff8c42&color=fff&size=128&name=User" alt="Profile Picture"/>
          <button class="avatar-edit-btn" onclick="editprofilepicture()">Edit</button>
        </div>
        <div class="profile-info">
          <h1 id="welcome-message">Welcome!</h1>
          <p id="username" class="username-tag"></p>
          <button class="signout-btn" onclick="signOut()">Sign Out</button>
        </div>
      </div>

      <!-- Action Cards -->
      <div class="action-grid">
        <a href="Recipe Form.html" class="action-card">
          <div class="action-icon">🍳</div>
          <h3>Create Recipe</h3>
          <p>Share your own dish with the community</p>
        </a>
        <a href="recipe box.html" class="action-card">
          <div class="action-icon">📦</div>
          <h3>Recipe Box</h3>
          <p>Browse all your saved recipes</p>
        </a>
        <a href="Favorite.html" class="action-card">
          <div class="action-icon">❤️</div>
          <h3>My Favorites</h3>
          <p>Quick access to recipes you love</p>
        </a>
      </div>

      <!-- Favorites Preview -->
      <div class="section">
        <h2>Favorite Recipes</h2>
        <div id="favoritesPreview" class="favorites-grid">
          <p class="empty-msg">Loading favorites...</p>
        </div>
      </div>

    </div>

    <script src="../Databases/accountUPD.js"></script>
    <script src="../Databases/Navbar.js"></script>

  </body>
  </html>
