<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — Dish Dash</title>
  <link rel="stylesheet" href="CSS/Dish-Dash.css?v=3">
  <link rel="stylesheet" href="CSS/Navbar.css?v=3">
  <style>
    .detail-page { max-width: 1200px; margin: 32px auto; padding: 0 24px 60px; }

    .three-col {
      display: grid;
      grid-template-columns: 200px 1fr 280px;
      gap: 24px;
      align-items: start;
    }

    /* LEFT */
    .col-left { display: flex; flex-direction: column; gap: 10px; }
    .recipe-photo {
      width: 100%; height: 190px; object-fit: cover;
      border-radius: 4px; display: block; background: #f0f0f0;
      border: 1px solid #e0e0e0;
    }

    /* CENTRE */
    .col-centre { display: flex; flex-direction: column; }
    .recipe-title { font-size: 1.8rem; font-weight: 800; color: #1a1a1a; line-height: 1.2; margin-bottom: 6px; }
    .recipe-author { font-size: .9rem; color: #999; margin-bottom: 14px; }

    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .pill {
      background: #fff3ea; color: #F5890A; border: 1px solid #F5890A;
      border-radius: 4px; padding: 4px 12px; font-size: .82rem; font-weight: 600;
    }

    .recipe-desc {
      font-size: .95rem; color: #555; line-height: 1.7;
      padding: 14px 16px; background: #fafafa;
      border: 1px solid #eee; margin-bottom: 20px;
    }

    .btn-vault {
      display: inline-block; padding: 10px 22px; background: #F5890A;
      color: white; border: none; border-radius: 4px; font-size: .9rem;
      font-weight: 700; font-family: inherit; cursor: pointer;
      margin-bottom: 24px; align-self: flex-start;
    }
    .btn-vault:hover { background: #d9760a; }
    .btn-vault.saved { background: #ccc; color: #888; cursor: default; }

    .box-heading {
      font-size: 1rem; font-weight: 700; color: #1a1a1a;
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee;
    }

    .ingredients-box, .steps-box {
      border: 1px solid #e0e0e0; padding: 18px 20px;
    }
    .steps-box { margin-top: 24px; }

    .ingredient-row {
      padding: 6px 0; border-bottom: 1px solid #eee;
      font-size: .92rem; color: #444;
    }
    .ingredient-row:last-child { border-bottom: none; }

    .step-row { display: flex; gap: 14px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #eee; }
    .step-row:last-child { border-bottom: none; }
    .step-num {
      min-width: 26px; height: 26px;
      background: #F5890A; color: white; font-size: .8rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-text { font-size: .92rem; color: #444; line-height: 1.6; }

    /* RIGHT */
    .col-right { display: flex; flex-direction: column; gap: 20px; }

    .cultural-card {
      background: #fff8f3; border-left: 3px solid #F5890A;
      padding: 18px 20px; border: 1px solid #eee; border-left: 3px solid #F5890A;
    }
    .cultural-card h3 { color: #F5890A; font-size: .95rem; font-weight: 700; margin-bottom: 12px; }
    .cultural-card p { color: #555; line-height: 1.6; font-size: .9rem; margin-bottom: 8px; }
    .cultural-card p:last-child { margin-bottom: 0; }

    .video-box { padding: 18px 20px; border: 1px solid #e0e0e0; }
    .video-box h3 { font-size: .95rem; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    .back-btn {
      display: inline-block; padding: 8px 16px; background: white;
      border: 1px solid #ccc; color: #555; font-size: .9rem; font-weight: 600;
      font-family: inherit; cursor: pointer; margin-bottom: 24px;
    }
    .back-btn:hover { color: #F5890A; border-color: #F5890A; }

    .empty-msg { text-align: center; padding: 60px 24px; color: #888; }
    .empty-msg a { color: #F5890A; font-weight: 700; }

    @media (max-width: 1024px) { .three-col { grid-template-columns: 160px 1fr 240px; } }
    @media (max-width: 768px) {
      .three-col { grid-template-columns: 1fr; }
      .col-left { flex-direction: row; overflow-x: auto; gap: 8px; }
      .recipe-photo { min-width: 130px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="window.location.href='Dish-Dash.html'" style="cursor:pointer">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Snack.html">Snacks</a>
      <a href="Desert.html">Dessert</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
  </header>

  <div class="detail-page">
    <button class="back-btn" onclick="window.history.back()">← Back</button>
    <div id="detail-content"></div>
  </div>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/RecipeDetail.js"></script>
  <script src="../Databases/Navbar.js"></script>

</body>
</html>
