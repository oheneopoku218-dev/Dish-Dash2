<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — Dish Dash</title>
  <link rel="stylesheet" href="CSS/Dish-Dash.css">
  <link rel="stylesheet" href="CSS/Navbar.css">
  <style>
    /* ---- Three-column layout ---- */
    .detail-page {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px 60px;
    }

    .three-col {
      display: grid;
      grid-template-columns: 200px 1fr 280px;
      gap: 24px;
    }

    /* ---- Left column: photos ---- */
    .col-left {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .recipe-photo {
      width: 100%;
      height: 190px;
      display: block;
      background-color: #f0f0f0;
      border: 1px solid #e0e0e0;
    }

    /* ---- Centre column: title, ingredients, steps ---- */
    .col-centre {
      display: flex;
      flex-direction: column;
    }

    .recipe-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .recipe-author {
      font-size: 0.9rem;
      color: #999;
      margin-bottom: 14px;
    }

    /* ---- Pill tags (meal type, time, difficulty) ---- */
    .pill-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .pill {
      background-color: #fff3ea;
      color: #f5890a;
      border: 1px solid #f5890a;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    /* ---- Description box ---- */
    .recipe-desc {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.7;
      padding: 14px 16px;
      background-color: #fafafa;
      border: 1px solid #eee;
      margin-bottom: 20px;
    }

    /* ---- Save to vault button ---- */
    .btn-vault {
      display: inline-block;
      padding: 10px 22px;
      background-color: #f5890a;
      color: white;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 24px;
    }

    .btn-vault.saved {
      background-color: #ccc;
      color: #888;
      cursor: default;
    }

    /* ---- Section headings (Ingredients, Instructions) ---- */
    .box-heading {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    /* ---- Ingredients box ---- */
    .ingredients-box {
      border: 1px solid #e0e0e0;
      padding: 18px 20px;
    }

    .ingredient-row {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.92rem;
      color: #444;
    }

    .ingredient-row:last-child {
      border-bottom: none;
    }

    /* ---- Steps box ---- */
    .steps-box {
      border: 1px solid #e0e0e0;
      padding: 18px 20px;
      margin-top: 24px;
    }

    .step-row {
      display: flex;
      gap: 14px;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .step-row:last-child {
      border-bottom: none;
    }

    /* ---- Step number circle ---- */
    .step-num {
      min-width: 26px;
      height: 26px;
      background-color: #f5890a;
      color: white;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-text {
      font-size: 0.92rem;
      color: #444;
      line-height: 1.6;
    }

    /* ---- Right column: cultural context ---- */
    .col-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .cultural-card {
      background-color: #fff8f3;
      border-left: 3px solid #f5890a;
      border: 1px solid #eee;
      border-left: 3px solid #f5890a;
      padding: 18px 20px;
    }

    .cultural-card h3 {
      color: #f5890a;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .cultural-card p {
      color: #555;
      line-height: 1.6;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    /* ---- Back button ---- */
    .back-btn {
      display: inline-block;
      padding: 8px 16px;
      background-color: white;
      border: 1px solid #ccc;
      color: #555;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 24px;
    }

    .empty-msg {
      text-align: center;
      padding: 60px 24px;
      color: #888;
    }

    .empty-msg a {
      color: #f5890a;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="window.location.href='Dish-Dash.html'" style="cursor:pointer">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Snack.html">Snacks</a>
      <a href="Desert.html">Dessert</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
  </header>

  <div class="detail-page">
    <button class="back-btn" onclick="window.history.back()">Back</button>
    <div id="detail-content"></div>
  </div>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/RecipeDetail.js"></script>
  <script src="../Databases/Navbar.js"></script>

</body>
</html>
