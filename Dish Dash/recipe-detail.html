<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — Dish Dash</title>
  <link rel="stylesheet" href="CSS/Dish-Dash.css?v=3">
  <link rel="stylesheet" href="CSS/Navbar.css?v=3">
  <style>
    .detail-page { max-width: 1280px; margin: 36px auto; padding: 0 24px 70px; }

    .three-col {
      display: grid;
      grid-template-columns: 220px 1fr 300px;
      gap: 28px;
      align-items: start;
    }

    /* LEFT — photo stack */
    .col-left { display: flex; flex-direction: column; gap: 12px; position: sticky; top: 88px; }
    .recipe-photo {
      width: 100%; aspect-ratio: 1/1; object-fit: cover;
      border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,.09);
      display: block; background: linear-gradient(135deg,#ffe8d4,#fdf0e5);
    }

    /* CENTRE */
    .col-centre { display: flex; flex-direction: column; }
    .recipe-title { font-size: 2rem; font-weight: 800; color: #1a1a1a; line-height: 1.2; margin-bottom: 14px; }

    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .pill {
      background: #fff3ea; color: #F5890A; border-radius: 20px;
      padding: 5px 16px; font-size: .82rem; font-weight: 700;
    }

    .recipe-desc {
      font-size: .96rem; color: #555; line-height: 1.75;
      padding: 18px 22px; background: #fafaf9;
      border-radius: 12px; border-left: 3px solid #ffe0cc; margin-bottom: 24px;
    }

    .btn-vault {
      display: inline-block; padding: 12px 26px; background: #F5890A;
      color: white; border: none; border-radius: 10px; font-size: .95rem;
      font-weight: 700; font-family: inherit; cursor: pointer;
      transition: background .2s; margin-bottom: 28px; align-self: flex-start;
    }
    .btn-vault:hover { background: #d9760a; }
    .btn-vault.saved { background: #ddd; color: #999; cursor: default; }

    .box-heading {
      font-size: 1.1rem; font-weight: 800; color: #1a1a1a;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid #fff3ea;
    }

    .ingredients-box, .steps-box {
      border: 1.5px solid #ffe0c8; border-radius: 14px; padding: 22px 24px;
    }
    .steps-box { margin-top: 28px; }

    .ingredient-row {
      padding: 7px 0; border-bottom: 1px solid #f5ece4;
      font-size: .93rem; color: #444;
    }
    .ingredient-row:last-child { border-bottom: none; }

    .step-row { display: flex; gap: 16px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f5ece4; }
    .step-row:last-child { border-bottom: none; }
    .step-num {
      min-width: 28px; height: 28px; border-radius: 50%;
      background: #F5890A; color: white; font-size: .82rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
    }
    .step-text { font-size: .93rem; color: #444; line-height: 1.65; }

    /* RIGHT */
    .col-right { display: flex; flex-direction: column; gap: 24px; position: sticky; top: 88px; }

    .cultural-card {
      background: #fff8f3; border-left: 4px solid #F5890A;
      border-radius: 14px; padding: 22px 24px;
    }
    .cultural-card h3 { color: #F5890A; font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
    .cultural-card p { color: #555; line-height: 1.65; font-size: .9rem; margin-bottom: 8px; }
    .cultural-card p:last-child { margin-bottom: 0; }

    .video-box {
      background: white; border-radius: 14px; padding: 22px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .video-box h3 {
      font-size: 1rem; font-weight: 700; color: #1a1a1a;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid #fff3ea;
    }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; background: white; border: 1.5px solid #e8e8e8;
      border-radius: 10px; color: #555; font-size: .9rem; font-weight: 600;
      font-family: inherit; cursor: pointer; margin-bottom: 28px;
      transition: border-color .2s, color .2s;
    }
    .back-btn:hover { border-color: #F5890A; color: #F5890A; }

    .empty-msg { text-align: center; padding: 80px 24px; color: #888; }
    .empty-msg a { color: #F5890A; font-weight: 700; }

    @media (max-width: 1024px) { .three-col { grid-template-columns: 180px 1fr 260px; gap: 20px; } }
    @media (max-width: 768px) {
      .three-col { grid-template-columns: 1fr; }
      .col-left { flex-direction: row; overflow-x: auto; gap: 10px; position: static; }
      .recipe-photo { min-width: 140px; }
      .col-right { position: static; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="window.location.href='Dish-Dash.html'" style="cursor:pointer">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Snack.html">Snacks</a>
      <a href="Desert.html">Dessert</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
  </header>

  <div class="detail-page">
    <button class="back-btn" onclick="window.history.back()">← Back</button>
    <div id="detail-content"></div>
  </div>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/RecipeDetail.js"></script>
  <script src="../Databases/Navbar.js"></script>

</body>
</html>
