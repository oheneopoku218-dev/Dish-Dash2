<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Box — Dish Dash</title>
  <link rel="stylesheet" href="CSS/Dish-Dash.css?v=3">
  <link rel="stylesheet" href="CSS/Navbar.css?v=3">
  <style>
    .page-hero {
      text-align: center; padding: 40px 24px 28px;
      background: white; border-bottom: 1px solid #eee;
    }
    .page-hero h2 { font-size: 1.8rem; font-weight: 800; color: #1a1a1a; margin-bottom: 6px; }
    .page-hero p  { font-size: .95rem; color: #888; }

    .filter-row {
      display: flex; justify-content: center;
      flex-wrap: wrap; gap: 8px; padding: 24px 24px 0;
    }
    .pill-btn {
      padding: 7px 20px; border: 2px solid #F5890A;
      background: transparent; color: #F5890A;
      font-family: inherit; font-size: .85rem; font-weight: 700; cursor: pointer;
    }
    .pill-btn:hover  { background: #fff3ea; }
    .pill-btn.active { background: #F5890A; color: white; }

    .grid-wrapper { max-width: 1200px; margin: 28px auto; padding: 0 24px 60px; }

    #recipeBoxContainer {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }

    .rb-card {
      background: white; border: 1px solid #e0e0e0;
      cursor: pointer; display: flex; flex-direction: column;
    }
    .rb-card:hover { border-color: #F5890A; }

    .rb-card img { width: 100%; height: 170px; object-fit: cover; display: block; background: #f0f0f0; }
    .rb-card-img-placeholder { width: 100%; height: 170px; background: #f0f0f0; }
    .rb-card-body { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .rb-card-name { font-size: .95rem; font-weight: 700; color: #1a1a1a; }
    .rb-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tag-meal {
      background: #fff3ea; color: #F5890A; border: 1px solid #F5890A;
      padding: 2px 10px; font-size: .75rem; font-weight: 600; text-transform: capitalize;
    }
    .tag-time { font-size: .8rem; color: #999; }

    .empty-state { text-align: center; padding: 60px 24px; grid-column: 1/-1; }
    .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 14px; }
    .empty-state p { color: #888; font-size: .95rem; margin-bottom: 6px; }
    .empty-state a { color: #F5890A; font-weight: 700; text-decoration: none; }

    .loading-msg { text-align: center; padding: 60px; color: #aaa; grid-column: 1/-1; }

    @media (max-width: 900px) { #recipeBoxContainer { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 560px) { #recipeBoxContainer { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="window.location.href='Dish-Dash.html'" style="cursor:pointer">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Snack.html">Snacks</a>
      <a href="Desert.html">Dessert</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
  </header>

  <div class="page-hero">
    <h2>My Recipe Box</h2>
    <p>All the recipes you've saved in one place</p>
  </div>

  <div class="filter-row">
    <button class="pill-btn active" data-filter="all">All</button>
    <button class="pill-btn" data-filter="breakfast">Breakfast</button>
    <button class="pill-btn" data-filter="lunch">Lunch</button>
    <button class="pill-btn" data-filter="dinner">Dinner</button>
    <button class="pill-btn" data-filter="dessert">Dessert</button>
  </div>

  <div class="grid-wrapper">
    <div id="recipeBoxContainer">
      <p class="loading-msg">Loading your recipe box…</p>
    </div>
  </div>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/recipe boxUPD.js"></script>
  <script src="../Databases/Navbar.js"></script>

</body>
</html>
