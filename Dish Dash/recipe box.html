<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Box — Dish Dash</title>
  <link rel="stylesheet" href="CSS/Dish-Dash.css?v=3">
  <link rel="stylesheet" href="CSS/Navbar.css?v=3">
  <style>
    .page-hero {
      text-align: center;
      padding: 48px 24px 36px;
      background: white;
      border-bottom: 1px solid #f0e8df;
    }
    .page-hero h2 { font-size: 2rem; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
    .page-hero p  { font-size: 1rem; color: #888; }

    .filter-row {
      display: flex; justify-content: center;
      flex-wrap: wrap; gap: 10px; padding: 28px 24px 0;
    }
    .pill-btn {
      padding: 8px 22px; border-radius: 24px;
      border: 2px solid #F5890A; background: transparent;
      color: #F5890A; font-family: inherit; font-size: .88rem;
      font-weight: 700; cursor: pointer; transition: background .18s, color .18s;
    }
    .pill-btn:hover  { background: #fff3ea; }
    .pill-btn.active { background: #F5890A; color: white; }

    .grid-wrapper { max-width: 1200px; margin: 32px auto; padding: 0 24px 70px; }

    #recipeBoxContainer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .rb-card {
      background: white; border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,.07); cursor: pointer;
      transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column;
    }
    .rb-card:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(0,0,0,.11); }

    .rb-card img {
      width: 100%; height: 180px; object-fit: cover; display: block;
      background: linear-gradient(135deg,#ffe8d4,#fdf0e5);
    }
    .rb-card-img-placeholder {
      width: 100%; height: 180px;
      background: linear-gradient(135deg,#ffe8d4,#fdf0e5);
    }
    .rb-card-body { padding: 16px 18px 20px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .rb-card-name { font-size: 1rem; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
    .rb-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tag-meal {
      background: #fff3ea; color: #F5890A; border-radius: 20px;
      padding: 3px 12px; font-size: .76rem; font-weight: 700; text-transform: capitalize;
    }
    .tag-time { font-size: .8rem; color: #999; font-weight: 500; }

    .empty-state { text-align: center; padding: 80px 24px; grid-column: 1/-1; }
    .empty-state .icon { font-size: 3rem; display: block; margin-bottom: 16px; }
    .empty-state p { color: #888; font-size: 1rem; margin-bottom: 6px; }
    .empty-state a { color: #F5890A; font-weight: 700; text-decoration: none; }

    .loading-msg { text-align: center; padding: 60px; color: #aaa; grid-column: 1/-1; }

    @media (max-width: 900px) { #recipeBoxContainer { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 560px) { #recipeBoxContainer { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="window.location.href='Dish-Dash.html'" style="cursor:pointer">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Snack.html">Snacks</a>
      <a href="Desert.html">Dessert</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
  </header>

  <div class="page-hero">
    <h2>My Recipe Box</h2>
    <p>All the recipes you've saved in one place</p>
  </div>

  <div class="filter-row">
    <button class="pill-btn active" data-filter="all">All</button>
    <button class="pill-btn" data-filter="breakfast">Breakfast</button>
    <button class="pill-btn" data-filter="lunch">Lunch</button>
    <button class="pill-btn" data-filter="dinner">Dinner</button>
    <button class="pill-btn" data-filter="dessert">Dessert</button>
  </div>

  <div class="grid-wrapper">
    <div id="recipeBoxContainer">
      <p class="loading-msg">Loading your recipe box…</p>
    </div>
  </div>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/recipe boxUPD.js"></script>
  <script src="../Databases/Navbar.js"></script>

</body>
</html>
