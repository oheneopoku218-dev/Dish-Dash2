<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Box — Dish Dash</title>
  <link rel="stylesheet" href="CSS/Dish-Dash.css">
  <link rel="stylesheet" href="CSS/Navbar.css">
  <link rel="stylesheet" href="CSS/recipe box.css">
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="window.location.href='Dish-Dash.html'" style="cursor:pointer">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Snack.html">Snacks</a>
      <a href="Desert.html">Dessert</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
  </header>

  <div class="page-hero">
    <h2>My Recipe Box</h2>
    <p>All the recipes you've saved in one place</p>
  </div>

  <div class="filter-row">
    <button class="pill-btn active" data-filter="all">All</button>
    <button class="pill-btn" data-filter="breakfast">Breakfast</button>
    <button class="pill-btn" data-filter="lunch">Lunch</button>
    <button class="pill-btn" data-filter="dinner">Dinner</button>
    <button class="pill-btn" data-filter="dessert">Dessert</button>
  </div>

  <div class="grid-wrapper">
    <div id="recipeBoxContainer">
      <p class="loading-msg">Loading your recipe box...</p>
    </div>
  </div>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/recipe boxUPD.js"></script>
  <script src="../Databases/Navbar.js"></script>

</body>
</html>
