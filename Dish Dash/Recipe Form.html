<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Recipe - Dish Dash</title>
  <link rel="stylesheet" href="CSS/Dish-Dash.css">
  <link rel="stylesheet" href="CSS/Navbar.css">
  <link rel="stylesheet" href="CSS/recipe form.css">
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="window.location.href='Dish-Dash.html'" style="cursor:pointer">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Snack.html">Snacks</a>
      <a href="Desert.html">Dessert</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
  </header>

  <div class="form-wrapper">
    <h1>Add a Recipe</h1>

    <form id="recipe-form">

      <div class="form-group">
        <label>Recipe Name</label>
        <input type="text" id="title" placeholder="e.g. Jollof Rice" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="description" placeholder="Short description of your recipe" required></textarea>
      </div>

      <div class="form-group">
        <label>Meal Type</label>
        <select id="mealType" required>
          <option value="">Select category</option>
          <option value="Breakfast">Breakfast</option>
          <option value="Lunch">Lunch</option>
          <option value="Dinner">Dinner</option>
          <option value="Dessert">Dessert</option>
          <option value="Snack">Snack</option>
        </select>
      </div>

      <div class="form-group">
        <label>Ingredients <span class="hint">(comma separated)</span></label>
        <textarea id="ingredients" placeholder="e.g. rice, tomatoes, onion" required></textarea>
      </div>

      <div class="form-group">
        <label>Steps</label>
        <div id="stepsBox">
          <div class="step-row">
            <span class="step-number">1.</span>
            <input type="text" class="step-input" placeholder="Enter step description" required>
            <button type="button" class="add-step">+ Add Step</button>
            <button type="button" class="remove-step">Remove</button>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Cooking Time (mins)</label>
          <input type="number" id="cookingTime" placeholder="e.g. 30" required>
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select id="difficulty" required>
            <option value="">Select</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Dietary Tags <span class="hint">(comma separated)</span></label>
        <input type="text" id="dietaryTags" placeholder="e.g. vegan, gluten-free">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Origin</label>
          <input type="text" id="origin" placeholder="e.g. Ghana">
        </div>
        <div class="form-group">
          <label>Tradition</label>
          <input type="text" id="tradition" placeholder="e.g. West African">
        </div>
      </div>

      <!-- Media Section -->
      <div class="form-group" style="margin-top:24px;border-top:2px solid #ff8c42;padding-top:24px;">
        <h3 style="margin-bottom:16px;color:#ff8c42;">Media</h3>

        <div class="form-group">
          <label>Recipe Image URL</label>
          <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg">
          <img id="imagePreview" src="" alt="" style="display:none;margin-top:10px;max-width:100%;max-height:200px;border-radius:8px;object-fit:cover;">
        </div>

        <div class="form-group">
          <label>Recipe Video URL <span class="hint">(YouTube or direct link)</span></label>
          <input type="url" id="videoUrl" placeholder="https://youtube.com/watch?v=...">
        </div>
      </div>

      <!-- Cultural Context Section -->
      <div class="form-group" style="margin-top:24px;border-top:2px solid #ff8c42;padding-top:24px;">
        <h3 style="margin-bottom:16px;color:#ff8c42;">Cultural Context</h3>

        <div class="form-group">
          <label>Cultural Story</label>
          <textarea id="culturalStory" placeholder="Share the story or history behind this dish..."></textarea>
        </div>

        <div class="form-group">
          <label>When is it typically eaten?</label>
          <input type="text" id="culturalOccasion" placeholder="e.g. Weddings, Christmas, everyday meal">
        </div>

        <div class="form-group">
          <label>Regional Variations</label>
          <textarea id="culturalVariations" placeholder="Describe any regional or family variations..."></textarea>
        </div>
      </div>

      <div class="form-group">
        <label>Visibility</label>
        <select id="visibility">
          <option value="public">Public — everyone can see this</option>
          <option value="private">Private — only you can see this</option>
        </select>
      </div>

      <button type="submit" class="submit-btn">Submit Recipe</button>
      <p id="form-error" class="error"></p>

    </form>
  </div>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/RecipeForm.js"></script>
  <script src="../Databases/Navbar.js"></script>
</body>
</html>
