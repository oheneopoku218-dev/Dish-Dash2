 <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport"
  content="width=device-width,
  initial-scale=1.0">
    <title>Add Recipe - Dish Dash</title>
  
    <link rel="stylesheet"
  href="CSS/Dish-Dash.css">
    <link rel="stylesheet"
  href="CSS/Navbar.css">
    <link rel="stylesheet" href="CSS/recipe
  form.css">
   <link rel="stylesheet" href="CSS/recipe form.css">
  </head>
  <body>

    <header class="site-header">
      <h1 class="site-title" onclick="window.loc
  ation.href='Dish-Dash.html'">Dish Dash</h1>
    </header>

    <div class="form-wrapper">
      <h1>Add a Recipe</h1>

      <form id="recipe-form">

        <div class="form-group">
          <label>Recipe Name</label>
          <input type="text" id="title"
  placeholder="e.g. Jollof Rice" required>
        </div>
        <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" placeholder="Short description of your recipe" required></textarea>
  </div>

        <div class="form-group">
          <label>Meal Type</label>
          <select id="mealType" required>
            <option value="">Select
  category</option>
            <option
  value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option
  value="Dinner">Dinner</option>
            <option
  value="Dessert">Dessert</option>
            <option value="Snack">Snack</option>
          </select>
        </div>

        <div class="form-group">
          <label>Ingredients <span
  class="hint">(comma separated)</span></label>
          <textarea id="ingredients"
  placeholder="e.g. rice, tomatoes, onion"
  required></textarea>
        </div>

        <div class="form-group">
          <label>Steps</label>
          <div id="stepsBox">
            <div class="step-row">
              <span
  class="step-number">1.</span>
              <input type="text"
  class="step-input" placeholder="Enter step
  description" required>
              <button type="button"
  class="add-step">+ Add Step</button>
              <button type="button"
  class="remove-step">Remove</button>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Cooking Time (mins)</label>
            <input type="number"
  id="cookingTime" placeholder="e.g. 30"
  required>
          </div>
          <div class="form-group">
            <label>Difficulty</label>
            <select id="difficulty" required>
              <option value="">Select</option>
              <option value="Easy">Easy</option>
              <option
  value="Medium">Medium</option>
              <option value="Hard">Hard</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Dietary Tags <span
  class="hint">(comma separated)</span></label>
          <input type="text" id="dietaryTags"
  placeholder="e.g. vegan, gluten-free">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Origin</label>
            <input type="text" id="origin"
  placeholder="e.g. Ghana">
          </div>
          <div class="form-group">
            <label>Tradition</label>
            <input type="text" id="tradition"
  placeholder="e.g. West African">
          </div>
        </div>
<div class="form-group">
    <label>Visibility</label>
    <select id="visibility">
      <option value="public">Public — everyone can see this</option>
      <option value="private">Private — only you can see this</option>
    </select>
  </div>
        <button type="submit"
  class="submit-btn">Submit Recipe</button>
        <p id="form-error" class="error"></p>

      </form>
    </div>

    <script
  src="../Databases/RecipeForm.js"></script>
    <script
  src="../Databases/Navbar.js"></script>
 <script src="../Databases/config.js"></script>
  </body>
  </html>
