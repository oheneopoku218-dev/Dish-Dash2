<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dish Dash</title>
  <link href="CSS/Dish-Dash.css" rel="stylesheet">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="recipe box.html">Recipes</a>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Desert.html">Dessert</a>
      <a href="About.html">About</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
    <div class="search">
      <input type="text" id="search-bar" placeholder="Search Goodness">
      <button id="search-button"></button>
    </div>
  </header>

  <section class="hero">
    <h1>Welcome to Dish Dash</h1>
    <p>Home to quick, delicious recipes</p>
  </section>

  <!-- ── Recommended ─────────────────────────────────────────── -->
  <section class="rec-section">
    <h2 class="rec-heading">Recommended</h2>
    <div id="recommended-grid" class="rec-grid"></div>
  </section>

  <style>
    .rec-section {
      max-width: 1200px;
      margin: 48px auto;
      padding: 0 24px 70px;
    }
    .rec-heading {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid #fff3ea;
    }
    .rec-heading::after {
      content: "";
      display: block;
      width: 48px;
      height: 3px;
      background: #F5890A;
      margin-top: 8px;
      border-radius: 2px;
    }
    .rec-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .rec-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,.07);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
    }
    .rec-card:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(0,0,0,.11); }
    .rec-card img {
      width: 100%; height: 180px; object-fit: cover; display: block;
      background: linear-gradient(135deg,#ffe8d4,#fdf0e5);
    }
    .rec-img-placeholder {
      width: 100%; height: 180px;
      background: linear-gradient(135deg,#ffe8d4,#fdf0e5);
    }
    .rec-card-body { padding: 16px 18px 20px; display: flex; flex-direction: column; gap: 8px; }
    .rec-card-name { font-size: 1rem; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
    .rec-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .rec-tag-meal {
      background: #fff3ea; color: #F5890A; border-radius: 20px;
      padding: 3px 12px; font-size: .76rem; font-weight: 700; text-transform: capitalize;
    }
    .rec-tag-time { font-size: .8rem; color: #999; font-weight: 500; }
    .rec-empty { color: #aaa; text-align: center; padding: 40px; grid-column: 1/-1; }
    @media (max-width: 900px) { .rec-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 560px) { .rec-grid { grid-template-columns: 1fr; } }
  </style>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/Recommended.js"></script>
  <script src="../Databases/Navbar.js"></script>
</body>
</html>
