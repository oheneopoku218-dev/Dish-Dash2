<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dish Dash</title>
  <link href="CSS/Dish-Dash.css" rel="stylesheet">
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <h1>Dish Dash</h1>
    </div>
    <nav>
      <a href="recipe box.html">Recipes</a>
      <a href="Breakfast.html">Breakfast</a>
      <a href="Lunch.html">Lunch</a>
      <a href="Dinner.html">Dinner</a>
      <a href="Desert.html">Dessert</a>
      <a href="About.html">About</a>
      <a href="Login.html" id="auth-link">Login / Sign Up</a>
    </nav>
    <div class="search">
      <input type="text" id="search-bar" placeholder="Search Goodness">
      <button id="search-button"></button>
    </div>
  </header>

  <section class="hero">
    <h1>Welcome to Dish Dash</h1>
    <p>Home to quick, delicious recipes</p>
  </section>
  <section class="rec-section">
    <h2 class="rec-heading">Recommended</h2>
    <div id="recommended-grid" class="rec-grid"></div>
  </section>
  <style>
    .rec-section { max-width: 1200px; margin: 36px auto; padding: 0 24px 60px; }
    .rec-heading {
      font-size: 1.4rem; font-weight: 800; color: #1a1a1a;
      margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee;
    }
    .rec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .rec-card {
      background: white; border: 1px solid #e0e0e0;
      cursor: pointer; display: flex; flex-direction: column;
    }
    .rec-card:hover { border-color: #F5890A; }
    .rec-card img { width: 100%; height: 170px; object-fit: cover; display: block; background: #f0f0f0; }
    .rec-img-placeholder { width: 100%; height: 170px; background: #f0f0f0; }
    .rec-card-body { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 8px; }
    .rec-card-name { font-size: .95rem; font-weight: 700; color: #1a1a1a; }
    .rec-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .rec-tag-meal {
      background: #fff3ea; color: #F5890A; border: 1px solid #F5890A;
      padding: 2px 10px; font-size: .75rem; font-weight: 600; text-transform: capitalize;
    }
    .rec-tag-time { font-size: .8rem; color: #999; }
    .rec-empty { color: #aaa; text-align: center; padding: 40px; grid-column: 1/-1; }
    @media (max-width: 900px) { .rec-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 560px) { .rec-grid { grid-template-columns: 1fr; } }
  </style>

  <script src="../Databases/config.js"></script>
  <script src="../Databases/Recommended.js"></script>
  <script src="../Databases/Navbar.js"></script>
</body>
</html>
